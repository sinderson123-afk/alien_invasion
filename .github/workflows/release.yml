name: Build and Release EXE

on:
  push:
    branches: [main]
    paths-ignore:
      - 'web/**'
      - 'README.md'
      - '.gitignore'
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Windows Dev ────────────────────────────────────────────
  build-dev:
    if: github.ref_type != 'tag'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pygame pyinstaller pillow

      - name: Convert icon
        run: |
          python -c "from PIL import Image; img=Image.open('resource/images/cover.png'); img.save('icon.ico',format='ICO',sizes=[(256,256)])"

      - name: Write build info (DEV)
        run: |
          echo "DEV_BUILD = True" > _build_info.py

      - name: Build EXE (DEV)
        run: |
          $env:ALIEN_DEV_BUILD = "1"
          python -m PyInstaller --onefile --windowed --name AlienInvasion --icon=icon.ico --add-data "resource;resource" --collect-all pygame --hidden-import pygame --hidden-import cv2 --clean --noconfirm alien_invasion.py

      - name: Delete old dev asset
        uses: actions/github-script@v7
        with:
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const dev = releases.find(r => r.tag_name === 'dev' && r.prerelease);
            if (dev) {
              for (const asset of dev.assets) {
                if (asset.name === 'AlienInvasion.exe') {
                  await github.rest.repos.deleteReleaseAsset({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    asset_id: asset.id,
                  });
                }
              }
            }

      - name: Upload to DEV Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Development Build
          body: "Auto build: ${{ github.sha }}\n**For testing only**\nCommit: ${{ github.event.head_commit.message }}"
          files: dist/AlienInvasion.exe
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── macOS Dev ──────────────────────────────────────────────
  build-dev-mac:
    if: github.ref_type != 'tag'
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pygame pyinstaller pillow

      - name: Write build info (DEV)
        run: echo "DEV_BUILD = True" > _build_info.py

      - name: Build macOS .app
        run: |
          python -m PyInstaller --windowed --name AlienInvasion \
            --add-data "resource:resource" \
            --collect-all pygame \
            --hidden-import pygame --hidden-import cv2 \
            --clean --noconfirm alien_invasion.py
          cd dist
          zip -r AlienInvasion-Mac-ARM64.zip AlienInvasion.app

      - name: Delete old dev Mac asset
        uses: actions/github-script@v7
        with:
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const dev = releases.find(r => r.tag_name === 'dev' && r.prerelease);
            if (dev) {
              for (const asset of dev.assets) {
                if (asset.name === 'AlienInvasion-Mac-ARM64.zip') {
                  await github.rest.repos.deleteReleaseAsset({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    asset_id: asset.id,
                  });
                }
              }
            }

      - name: Upload Mac to DEV Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Development Build
          files: dist/AlienInvasion-Mac-ARM64.zip
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Windows Release ────────────────────────────────────────
  build-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pygame pyinstaller pillow

      - name: Convert icon
        run: |
          python -c "from PIL import Image; img=Image.open('resource/images/cover.png'); img.save('icon.ico',format='ICO',sizes=[(256,256)])"

      - name: Write build info (RELEASE)
        run: |
          echo "DEV_BUILD = False" > _build_info.py

      - name: Build EXE (RELEASE)
        run: |
          python -m PyInstaller --onefile --windowed --name AlienInvasion --icon=icon.ico --add-data "resource;resource" --collect-all pygame --hidden-import pygame --hidden-import cv2 --clean --noconfirm alien_invasion.py

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: "Stable ${{ github.ref_name }}\n${{ github.event.head_commit.message }}"
          files: dist/AlienInvasion.exe
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version.json for Cloudflare Pages
        run: |
          echo "{\"latest\": \"${{ github.ref_name }}\"}" > web/version.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/version.json
          git commit -m "release: version.json -> ${{ github.ref_name }}" || true
          git push || true

  # ── macOS Release ──────────────────────────────────────────
  build-mac:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pygame pyinstaller pillow

      - name: Write build info (RELEASE)
        run: echo "DEV_BUILD = False" > _build_info.py

      - name: Build macOS .app
        run: |
          python -m PyInstaller --windowed --name AlienInvasion \
            --add-data "resource:resource" \
            --collect-all pygame \
            --hidden-import pygame --hidden-import cv2 \
            --clean --noconfirm alien_invasion.py
          cd dist
          zip -r AlienInvasion-Mac-ARM64.zip AlienInvasion.app

      - name: Upload Mac to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/AlienInvasion-Mac-ARM64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
