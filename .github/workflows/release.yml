name: Build and Release EXE

on:
  push:
    branches: [main]
    paths-ignore:
      - 'web/**'
      - 'README.md'
      - '.gitignore'
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-dev:
    if: github.ref_type != 'tag'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pygame pyinstaller pillow

      - name: Convert icon
        run: |
          python -c "from PIL import Image; img=Image.open('resource/images/cover.png'); img.save('icon.ico',format='ICO',sizes=[(256,256)])"

      - name: Write build info (DEV)
        run: |
          echo "DEV_BUILD = True" > _build_info.py

      - name: Build EXE (DEV)
        run: |
          $env:ALIEN_DEV_BUILD = "1"
          python -m PyInstaller --onefile --windowed --name AlienInvasion --icon=icon.ico --add-data "resource;resource" --collect-all pygame --hidden-import pygame --hidden-import cv2 --clean --noconfirm alien_invasion.py

      - name: Delete old dev asset
        uses: actions/github-script@v7
        with:
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const dev = releases.find(r => r.tag_name === 'dev' && r.prerelease);
            if (dev) {
              for (const asset of dev.assets) {
                if (asset.name === 'AlienInvasion.exe') {
                  await github.rest.repos.deleteReleaseAsset({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    asset_id: asset.id,
                  });
                }
              }
            }

      - name: Upload to DEV Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Development Build
          body: "自动构建: ${{ github.sha }}\n**仅供测试，请勿用于正常游玩**\n提交: ${{ github.event.head_commit.message }}"
          files: dist/AlienInvasion.exe
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pygame pyinstaller pillow

      - name: Convert icon
        run: |
          python -c "from PIL import Image; img=Image.open('resource/images/cover.png'); img.save('icon.ico',format='ICO',sizes=[(256,256)])"

      - name: Write build info (RELEASE)
        run: |
          echo "DEV_BUILD = False" > _build_info.py

      - name: Build EXE (RELEASE)
        run: |
          python -m PyInstaller --onefile --windowed --name AlienInvasion --icon=icon.ico --add-data "resource;resource" --collect-all pygame --hidden-import pygame --hidden-import cv2 --clean --noconfirm alien_invasion.py

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: "正式版 ${{ github.ref_name }}\n${{ github.event.head_commit.message }}"
          files: dist/AlienInvasion.exe
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
